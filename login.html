<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋對戰 - 玩家登入</title>
    <style>
        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background-color: #f4e1c1; /* 棋盤風格的木質溫暖色調 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 350px;
            border: 2px solid #b5885c;
        }
        h2 {
            text-align: center;
            color: #4a3319;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #593e1a;
            font-weight: bold;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #cccccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            border-color: #b5885c;
            outline: none;
        }
        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: #2c3e50; /* 採用黑棋色系作為登入主色 */
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-submit:hover {
            background-color: #1a252f;
        }
        .link-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666666;
        }
        .link-footer a {
            color: #8c6239;
            text-decoration: none;
            font-weight: bold;
        }
        .link-footer a:hover {
            text-underline-position: under;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>玩家登入</h2>
        
        <form action="login.php" method="POST">
            <div class="form-group">
                <label for="username">遊戲帳號 (Username)</label>
                <input type="text" id="username" name="username" required placeholder="請輸入您的帳號">
            </div>
            
            <div class="form-group">
                <label for="password">密碼 (Password)</label>
                <input type="password" id="password" name="password" required placeholder="請輸入您的密碼">
            </div>
            
            <button type="submit" class="btn-submit">登入遊戲</button>
        </form>
        
        <div class="link-footer">
            還沒有帳號嗎？ <a href="register.html">點此註冊新帳號</a></br>
        </div>
            <div class="link-footer">             
                <a href="index.html">返回首頁</a>
            </div>
    </div>

</body>
</html>
